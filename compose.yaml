name: bootleaf

services:
  app:
    image: bootleaf-starter:0.0.1-SNAPSHOT
    build:
      context: .
      dockerfile_inline: |
        # Pulled in case the user runs `docker compose up --build` before
        # `./mvnw spring-boot:build-image`. The Spring Boot Maven plugin
        # produces a richer image (CDS, layered jar, non-root) — prefer
        # that for prod. This Dockerfile is for the dev/demo path only.
        FROM eclipse-temurin:21-jre AS runtime
        RUN apt-get update \
         && apt-get install -y --no-install-recommends curl \
         && rm -rf /var/lib/apt/lists/* \
         && useradd --system --uid 10001 --create-home spring
        WORKDIR /app
        COPY target/*.jar /app/app.jar
        USER spring
        EXPOSE 8080
        ENTRYPOINT ["java", "-jar", "/app/app.jar"]
    pull_policy: build
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SERVER_PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    restart: unless-stopped

configs:
  caddyfile:
    content: |
      :80 {
          encode gzip zstd
          reverse_proxy app:8080 {
              header_up X-Forwarded-Proto {scheme}
              header_up X-Forwarded-Host  {host}
          }
          @assets path /css/* /js/* /lib/* /images/* /favicon.svg
          header @assets Cache-Control "public, max-age=31536000, immutable"
      }
