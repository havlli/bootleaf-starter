spring.application.name=bootleaf-starter-local

# Disable caching so template / static changes are picked up live
spring.thymeleaf.cache=false
spring.web.resources.chain.cache=false
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.chain.strategy.content.enabled=false

# DevTools livereload (browser-sync handles full reload, devtools handles JVM restart)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=false
