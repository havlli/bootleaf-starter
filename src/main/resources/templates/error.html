<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="h-full">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="color-scheme" content="light dark"/>
    <title th:text="|${status} · BootLeaf|">Error · BootLeaf</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <script>
        (() => {
            const stored = localStorage.getItem('theme');
            const dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.toggle('dark', dark);
        })();
    </script>
</head>
<body class="grid min-h-full place-items-center bg-[var(--color-surface)] px-6 text-[var(--color-ink)] dark:bg-[var(--color-surface-dark)] dark:text-[var(--color-ink-dark)]">

<div class="mx-auto max-w-md text-center">
    <p class="font-mono text-sm font-medium text-brand-600 dark:text-brand-300"
       th:text="${status} ?: '500'">500</p>
    <h1 class="mt-3 text-3xl font-semibold tracking-tight sm:text-4xl"
        th:text="${error} ?: 'Something went wrong'">Something went wrong</h1>
    <p class="mt-4 text-sm text-gray-600 dark:text-gray-400"
       th:text="${message} ?: 'The page you were looking for could not be served.'">
        The page you were looking for could not be served.
    </p>
    <a href="/"
       class="mt-8 inline-flex items-center gap-2 rounded-lg bg-gradient-to-b from-brand-500 to-brand-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm transition hover:from-brand-400 hover:to-brand-500">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to home
    </a>
</div>

</body>
</html>
