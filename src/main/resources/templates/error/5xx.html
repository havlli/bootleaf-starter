<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::title}, ~{::head/*}, ~{::main})}">
<head>
    <title th:text="|${status} Server error · BootLeaf|">Server error · BootLeaf</title>
</head>
<body>

<main class="mx-auto max-w-2xl px-6 pb-20">
    <div th:replace="~{fragments/error-card :: card(
            ${status} ?: 500,
            'Something went wrong on our end',
            ${message} ?: 'The request couldn''t be completed. Try again in a moment.')}"></div>
</main>

</body>
</html>
