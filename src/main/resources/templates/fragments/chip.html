<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="chip"
     class="fade-in inline-flex max-w-full cursor-pointer select-none items-center gap-1.5 rounded-full border border-brand-200 bg-brand-50 py-1 pl-3 pr-1.5 text-xs font-semibold text-brand-700 shadow-xs transition hover:shadow-sm dark:border-brand-700/60 dark:bg-brand-900/40 dark:text-brand-200"
     _="on click add .fade-out to me then wait 220ms then remove me">
    <span class="truncate" th:text="${content}">message</span>
    <button type="button"
            aria-label="Remove"
            class="grid h-5 w-5 place-items-center rounded-full text-brand-700/70 transition hover:bg-brand-100 hover:text-brand-700 dark:text-brand-200/70 dark:hover:bg-brand-800/70"
            _="on click halt then add .fade-out to my.parentElement then wait 220ms then remove my.parentElement">
        <svg viewBox="0 0 24 24" class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
    </button>
</div>

</body>
</html>
