<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="card(status, title, message)" class="grid place-items-center pt-20 text-center">
    <div class="max-w-md">
        <p class="font-mono text-sm font-medium text-brand-600 dark:text-brand-300"
           th:text="${status}">500</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-tight sm:text-4xl"
            th:text="${title}">Something went wrong</h1>
        <p class="mt-4 text-sm text-gray-600 dark:text-gray-400" th:text="${message}">
            The page you were looking for could not be served.
        </p>
        <a th:href="@{/}"
           class="mt-8 inline-flex items-center gap-2 rounded-lg bg-linear-to-b from-brand-500 to-brand-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm transition hover:from-brand-400 hover:to-brand-500">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to home
        </a>
    </div>
</div>

</body>
</html>
