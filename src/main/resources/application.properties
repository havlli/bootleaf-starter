spring.application.name=bootleaf-starter

# Performance
spring.threads.virtual.enabled=true
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml
server.http2.enabled=true

# Forwarded headers (for behind reverse proxies)
server.forward-headers-strategy=framework

# Static resource caching (long cache + content versioning for assets)
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# Build info exposed at /actuator/info
info.app.name=${spring.application.name}
info.app.description=Spring Boot + Thymeleaf + HTMX + _hyperscript + Tailwind CSS v4 starter
